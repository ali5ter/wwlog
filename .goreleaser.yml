version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/ali5ter/wwlog/cmd.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - name: wwlog
    directory: Formula
    repository:
      owner: ali5ter
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/ali5ter/wwlog
    description: Browse and export your Weight Watchers food log from the terminal
    license: MIT
    install: |
      bin.install "wwlog"
    test: |
      system "#{bin}/wwlog", "--version"

release:
  github:
    owner: ali5ter
    name: wwlog
